<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>虚幻材质参数提取工具</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html, body {
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            font-size: 16px;
            line-height: 1.6;
            color: #24292e;
            background-color: #fff;
        }
        .main-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
        }
        /* 左侧目录栏 */
        .sidebar {
            width: fit-content;
            min-width: 200px;
            max-width: 400px;
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            background-color: #f6f8fa;
            border-right: 1px solid #e1e4e8;
            padding: 20px 16px;
            flex-shrink: 0;
        }
        .sidebar-title {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e1e4e8;
            color: #1f2328;
        }
        .sidebar ul {
            list-style: none;
        }
        .sidebar li {
            margin-bottom: 4px;
        }
        .sidebar a {
            display: block;
            color: #24292e;
            text-decoration: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.9em;
            transition: background-color 0.15s;
            white-space: nowrap;
            cursor: pointer;
        }
        .sidebar a:hover {
            background-color: #e1e4e8;
            color: #0969da;
        }
        .sidebar .group-item {
            font-weight: 500;
        }
        /* 中间主内容区域 */
        .center-panel {
            flex: 1;
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
        }
        .center-panel-inner {
            max-width: 900px;
            margin: 0 auto;
            width: 100%;

        /* 右侧信息面板 */

            flex-direction: column;

        .right-panel-title {
            font-size: 1.1em;
            font-weight: 600;

            color: #1f2328;
        }
        .right-panel-section {

        /* 快速跳转按钮 */

            border-top: 1px solid #e1e4e8;
        }

        .btn-quick-nav {
            flex: 1;

        .btn-quick-nav:hover {
            background-color: #f3f4f6;
            border-color: #b0b7bf;
        }
        .btn-quick-nav:active {
            background-color: #e1e4e8;
        }
        /* 白屏遮罩动画 */
        .white-flash-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ffffff;
            opacity: 0;
            pointer-events: none;

        /* 顶部提示动画 */
        .toast-container {

        }
        .toast {
            background-color: #2da44e;
            color: #fff;
            padding: 10px 24px;

        /* 统计表格 */
        .stats-table {

        .stats-table th,
        .stats-table td {

        .stats-table th {

        }
        .stats-table tr:nth-child(even) {

        }
        .stats-table tr:last-child {
            font-weight: bold;
            background-color: #e1e4e8;
        }
        h1 {
            font-size: 2em;
            border-bottom: 1px solid #eaecef;
            padding-bottom: 0.3em;
            margin-bottom: 0.5em;
        }
        h2 {
            font-size: 1.5em;
            border-bottom: 1px solid #eaecef;
            padding-bottom: 0.3em;
            margin-top: 24px;
            margin-bottom: 16px;
            transition: background-color 0.6s cubic-bezier(0.4, 0, 0.2, 1);

        a {
            color: #0366d6;

        }
        a:hover {

        code {

            font-size: 85%;

        }
        .param-block {
            background-color: #f6f8fa;

            border-radius: 6px;
        }
        .param-header {
            display: flex;
            align-items: center;
            justify-content: space-between;

        }
        .param-name {
            font-weight: 600;
            font-size: 1.1em;
            word-break: break-all;
        }
        .param-name code {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            font-size: 1em;
            background-color: #e1e4e8;
            padding: 0.2em 0.4em;
            border-radius: 3px;
        }
        .btn-copy {
            padding: 4px 12px;
            font-size: 0.8em;
            font-weight: 500;
            color: #57606a;
            background-color: #e1e4e8;
            border: 1px solid #d0d7de;
            border-radius: 4px;
            cursor: pointer;

        .btn-copy:hover {

        }
        .btn-copy.copied {
            background-color: #2da44e;

        .param-prop {

            margin-bottom: 4px;

        }

            color: #6a737d;

            font-size: 1.5em;

        }
        /* 滚动条 */
        .sidebar::-webkit-scrollbar,
        .center-panel::-webkit-scrollbar,
        .right-panel::-webkit-scrollbar {

        }
        .sidebar::-webkit-scrollbar-track,
        .center-panel::-webkit-scrollbar-track,
        .right-panel::-webkit-scrollbar-track {

        }

        .center-panel::-webkit-scrollbar-thumb,

            background-color: #c1c1c1;

        .center-panel::-webkit-scrollbar-thumb:hover,

    .hidden {

<base target="_blank">
</head>
<body>
    <!-- 顶部提示 -->
    <div class="toast-container">
        <div class="toast" id="toast">生成成功！</div>
    </div>

    <div class="main-layout">
        <!-- 左侧目录栏 -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-title">目录</div>
            <ul id="toc-list">
            </ul>
        </div>

        <!-- 中间主内容区域 -->
        <div class="center-panel" id="center-panel">
            <!-- 白屏遮罩 -->
            <div class="white-flash-overlay" id="white-flash"></div>

            <div class="center-panel-inner">
                <!-- 报告内容 -->
                <div id="report-content">
                    <div class="empty-state">
                        <h3>等待输入</h3>
                        <p>点击右侧「粘贴并重新生成」自动读取剪贴板并生成报告<br>或在右侧输入栏手动粘贴后点击生成</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧信息面板 -->
        <div class="right-panel" id="right-panel">
            <div class="right-panel-title">操作面板</div>

            <!-- 粘贴并重新生成按钮 -->
            <button class="btn-paste-generate" onclick="pasteAndGenerate()">粘贴并重新生成</button>

            <!-- 输入区域 -->
            <div class="input-section-right">
                <textarea id="material-input" placeholder="手动粘贴虚幻材质文本到这里，然后点击下方按钮生成..."></textarea>
                <button class="btn-from-input" onclick="generateFromInput()">从输入栏中重新生成</button>
            </div>

            <!-- 生成日期 -->
            <div class="right-panel-section hidden" id="date-section">
                <div class="right-panel-label">生成日期</div>
                <div class="generate-date" id="generate-date">--</div>
            </div>

            <!-- 参数统计表格 -->
            <div class="right-panel-section hidden" id="stats-section">
                <div class="right-panel-label">参数统计</div>
                <table class="stats-table" id="right-stats-table">
                    <thead><tr><th>类型</th><th>数量</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>

            <!-- 快速跳转按钮 -->
            <div class="quick-nav-section hidden" id="quick-nav-section">
                <div class="quick-nav-buttons">
                    <button class="btn-quick-nav" onclick="scrollToTop()">到顶部</button>
                    <button class="btn-quick-nav" onclick="scrollToBottom()">到底部</button>
                </div>
            </div>
        </div>
    </div>

<script>
    // ==================== 提取逻辑 ====================
    function extractMaterialParameters(inputText) {
        const parameters = [];
        const lines = inputText.split('\n');
        const totalLines = lines.length;

        for (let i = 0; i < totalLines; i++) {
            const line = lines[i];
            const paramNameMatch = line.match(/ParameterName="([^"]+)"/);

            if (paramNameMatch) {
                const paramName = paramNameMatch[1];
                let nodeStart = i;
                let nodeEnd = i;

                // 向上找最近的 Begin Object
                for (let j = i; j >= Math.max(0, i - 100); j--) {
                    if (lines[j].includes('Begin Object Class=')) {
                        nodeStart = j;
                        break;
                    }
                }

                // 向下找对应的 End Object
                let depth = 1;
                for (let j = i + 1; j < Math.min(totalLines, i + 200); j++) {
                    if (lines[j].includes('Begin Object Class=')) {
                        depth++;
                    } else if (lines[j].includes('End Object')) {
                        depth--;
                        if (depth === 0) {
                            nodeEnd = j;
                            break;
                        }
                    }
                }

                // 获取类型
                let paramType = "Unknown";
                const classMatch = lines[nodeStart].match(/Begin Object Class=([^\s]+)/);
                if (classMatch) {
                    const fullClass = classMatch[1];
                    if (fullClass.includes('ScalarParameter')) paramType = "Scalar";
                    else if (fullClass.includes('VectorParameter')) paramType = "Vector4";
                    else if (fullClass.includes('TextureSampleParameter2D')) paramType = "Texture2D";
                    else if (fullClass.includes('StaticSwitchParameter')) paramType = "StaticSwitch";
                    else if (fullClass.includes('CurveAtlasRowParameter')) paramType = "Curve";
                    else if (fullClass.includes('CollectionParameter')) paramType = "CollectionParameter";
                    else if (fullClass.includes('MaterialExpressionTransform')) paramType = "NonParameter";
                    else paramType = "Other";
                }

                if (paramType === "Unknown" || paramType === "NonParameter") {
                    if (paramType !== "Other") continue;
                }

                // 搜索 Group
                let group = "";
                for (let k = nodeStart; k <= nodeEnd; k++) {
                    const groupMatch = lines[k].match(/Group="([^"]*)"/);
                    if (groupMatch) {
                        group = groupMatch[1];
                        break;
                    }
                }

                // 搜索 Desc
                let description = "";
                for (let k = nodeStart; k <= nodeEnd; k++) {
                    const descMatch = lines[k].match(/Desc="([^"]*)"/);
                    if (descMatch) {
                        description = descMatch[1];
                        break;
                    }
                }

                // 搜索 SortPriority
                let sortPriority = 32;
                for (let k = nodeStart; k <= nodeEnd; k++) {
                    const sortMatch = lines[k].match(/SortPriority=(\d+)/);
                    if (sortMatch) {
                        sortPriority = parseInt(sortMatch[1]);
                        break;
                    }
                }

                const paramData = {
                    type: paramType,
                    name: paramName,
                    group: group,
                    description: description,
                    sort_priority: sortPriority
                };

                // 根据类型提取额外信息
                if (paramType === "Scalar") {
                    let defaultVal = "0.0";
                    for (let k = nodeStart; k <= nodeEnd; k++) {
                        const defaultMatch = lines[k].match(/DefaultValue=([\d.-]+)/);
                        if (defaultMatch) {
                            defaultVal = defaultMatch[1];
                            break;
                        }
                    }
                    paramData.default = defaultVal;
                } else if (paramType === "Vector4") {
                    let defaultVal = "(0,0,0,1)";
                    for (let k = nodeStart; k <= nodeEnd; k++) {
                        const defaultMatch = lines[k].match(/DefaultValue=\(R=([\d.]+),G=([\d.]+),B=([\d.]+),A=([\d.]+)\)/);
                        if (defaultMatch) {
                            defaultVal = `(${defaultMatch[1]}, ${defaultMatch[2]}, ${defaultMatch[3]}, ${defaultMatch[4]})`;
                            break;
                        }
                    }
                    paramData.default = defaultVal;
                } else if (paramType === "StaticSwitch") {
                    let defaultVal = "false";
                    for (let k = nodeStart; k <= nodeEnd; k++) {
                        const defaultMatch = lines[k].match(/DefaultValue=(\w+)/);
                        if (defaultMatch) {
                            defaultVal = defaultMatch[1];
                            break;
                        }
                    }
                    paramData.default = defaultVal;
                } else if (paramType === "Texture2D") {
                    let texture = "None";
                    for (let k = nodeStart; k <= nodeEnd; k++) {
                        const textureMatch = lines[k].match(/Texture="([^"]+)"/);
                        if (textureMatch) {
                            texture = textureMatch[1];
                            break;
                        }
                    }
                    paramData.default_texture = texture;
                } else if (paramType === "Curve") {
                    let curve = "None";
                    for (let k = nodeStart; k <= nodeEnd; k++) {
                        const curveMatch = lines[k].match(/Curve="([^"]+)"/);
                        if (curveMatch) {
                            curve = curveMatch[1];
                            break;
                        }
                    }
                    paramData.curve = curve;
                } else if (paramType === "CollectionParameter") {
                    let collection = "Unknown";
                    for (let k = nodeStart; k <= nodeEnd; k++) {
                        const collectionMatch = lines[k].match(/Collection="([^"]+)"/);
                        if (collectionMatch) {
                            collection = collectionMatch[1];
                            break;
                        }
                    }
                    paramData.collection = collection;
                }

                parameters.push(paramData);
            }
        }

        // 去重
        const seen = new Set();
        const uniqueParams = [];
        for (const p of parameters) {
            const key = p.name + '|' + p.type;
            if (!seen.has(key)) {
                seen.add(key);
                uniqueParams.push(p);
            }
        }

        return uniqueParams;
    }

    // ==================== 提示动画 ====================
    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 2000);
    }

    // ==================== 白屏动画 ====================
    function triggerWhiteFlash() {
        const overlay = document.getElementById('white-flash');
        overlay.classList.add('active');
        setTimeout(() => {
            overlay.classList.remove('active');
        }, 150);
    }

    // ==================== 复制功能 ====================
    async function copyParamName(name, btnElement) {
        try {
            await navigator.clipboard.writeText(name);
            btnElement.textContent = '已复制';
            btnElement.classList.add('copied');
            setTimeout(() => {
                btnElement.textContent = '复制参数名';
                btnElement.classList.remove('copied');
            }, 1500);
        } catch (err) {
            // 降级方案
            const textarea = document.createElement('textarea');
            textarea.value = name;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);

            btnElement.textContent = '已复制';
            btnElement.classList.add('copied');
            setTimeout(() => {
                btnElement.textContent = '复制参数名';
                btnElement.classList.remove('copied');
            }, 1500);
        }
    }

    // ==================== 标题高亮动画 ====================
    function highlightHeading(el) {
        el.classList.add('highlight-scroll');
        setTimeout(() => {
            el.classList.remove('highlight-scroll');
        }, 1200);
    }

    // ==================== 快速跳转 ====================
    function scrollToTop() {
        const panel = document.getElementById('center-panel');
        panel.scrollTo({ top: 0 });
    }

    function scrollToBottom() {
        const panel = document.getElementById('center-panel');
        panel.scrollTo({ top: panel.scrollHeight });
    }

    // ==================== 生成报告 ====================
    async function pasteAndGenerate() {
        try {
            const clipboardText = await navigator.clipboard.readText();
            if (!clipboardText.trim()) {
                alert('剪贴板为空');
                return;
            }
            doGenerate(clipboardText, true);
        } catch (err) {
            alert('无法读取剪贴板，请确保已授予网页剪贴板权限');
            console.error('Clipboard error:', err);
        }
    }

    function generateFromInput() {
        const inputText = document.getElementById('material-input').value;
        if (!inputText.trim()) {
            alert('输入栏为空，请先粘贴内容');
            return;
        }
        doGenerate(inputText, false);
    }

    function doGenerate(inputText, fromClipboard) {
        // 触发白屏动画
        triggerWhiteFlash();

        const parameters = extractMaterialParameters(inputText);
        const now = new Date().toLocaleString('zh-CN');

        // 统计
        const typeCounts = {};
        for (const p of parameters) {
            typeCounts[p.type] = (typeCounts[p.type] || 0) + 1;
        }
        const totalCount = parameters.length;

        // 分离
        const collectionParams = parameters.filter(p => p.type === 'CollectionParameter');
        const normalParams = parameters.filter(p => p.type !== 'CollectionParameter');

        // 排序
        normalParams.sort((a, b) => {
            const aEmpty = a.group === "" ? 0 : 1;
            const bEmpty = b.group === "" ? 0 : 1;
            if (aEmpty !== bEmpty) return aEmpty - bEmpty;
            if (a.group !== b.group) return a.group.localeCompare(b.group);
            const aPriority = a.sort_priority !== undefined ? a.sort_priority : 9999;
            const bPriority = b.sort_priority !== undefined ? b.sort_priority : 9999;
            if (aPriority !== bPriority) return aPriority - bPriority;
            return a.name.localeCompare(b.name);
        });

        // 分组
        const groups = {};
        for (const p of normalParams) {
            const groupName = p.group || "未分组 (None)";
            if (!groups[groupName]) groups[groupName] = [];
            groups[groupName].push(p);
        }

        const sortedGroups = Object.keys(groups).sort((a, b) => {
            if (a === "未分组 (None)") return -1;
            if (b === "未分组 (None)") return 1;
            return a.localeCompare(b);
        });

        // 生成锚点
        function makeAnchor(text) {
            return text.toLowerCase()
                .replace(/ /g, '-')
                .replace(/[()]/g, '')
                .replace(/[^\w\-]/g, '')
                .replace(/-+/g, '-')
                .replace(/^-|-$/g, '');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 构建目录
        let tocHtml = '';
        for (const groupName of sortedGroups) {
            const anchor = makeAnchor(groupName);
            tocHtml += `<li class="group-item"><a onclick="scrollToSection('${anchor}')">${escapeHtml(groupName)}</a></li>`;
        }
        if (collectionParams.length > 0) {
            tocHtml += `<li class="group-item"><a onclick="scrollToSection('collection-params')">材质参数集</a></li>`;
        }
        document.getElementById('toc-list').innerHTML = tocHtml;

        // 构建报告内容
        let reportHtml = '';

        // 标题
        reportHtml += `<h1>材质参数统计报告</h1>`;

        // 各组详情
        for (const groupName of sortedGroups) {
            const anchor = makeAnchor(groupName);
            reportHtml += `<h2 id="${anchor}">${escapeHtml(groupName)}</h2>`;
            for (const param of groups[groupName]) {
                reportHtml += `<div class="param-block">`;
                reportHtml += `<div class="param-header">`;
                reportHtml += `<div class="param-name"><code>${escapeHtml(param.name)}</code></div>`;
                reportHtml += `<button class="btn-copy" onclick="copyParamName('${escapeHtml(param.name)}', this)">复制参数名</button>`;
                reportHtml += `</div>`;
                reportHtml += `<div class="param-prop">类型: ${escapeHtml(param.type)}</div>`;
                if (param.description) {
                    reportHtml += `<div class="param-prop">描述: ${escapeHtml(param.description)}</div>`;
                }
                if (param.default !== undefined) {
                    let dv = String(param.default);
                    if (dv.startsWith("'") && dv.endsWith("'")) dv = dv.slice(1, -1);
                    reportHtml += `<div class="param-prop">默认值: ${escapeHtml(dv)}</div>`;
                }
                if (param.default_texture) {
                    let tex = param.default_texture;
                    if (tex.includes("'")) {
                        const parts = tex.split("'");
                        tex = parts.length > 1 ? parts[parts.length - 2] : tex;
                    }
                    reportHtml += `<div class="param-prop">默认贴图: ${escapeHtml(tex)}</div>`;
                }
                if (param.curve) {
                    reportHtml += `<div class="param-prop">曲线资源: ${escapeHtml(param.curve)}</div>`;
                }
                if (param.collection) {
                    reportHtml += `<div class="param-prop">参数集: ${escapeHtml(param.collection)}</div>`;
                }
                if (param.sort_priority !== undefined) {
                    reportHtml += `<div class="param-prop">排序优先级: ${param.sort_priority}</div>`;
                }
                reportHtml += `</div>`;
            }
        }

        // 材质参数集
        if (collectionParams.length > 0) {
            reportHtml += `<h2 id="collection-params">材质参数集 (CollectionParameter)</h2>`;
            for (const param of collectionParams) {
                reportHtml += `<div class="param-block">`;
                reportHtml += `<div class="param-header">`;
                reportHtml += `<div class="param-name"><code>${escapeHtml(param.name)}</code></div>`;
                reportHtml += `<button class="btn-copy" onclick="copyParamName('${escapeHtml(param.name)}', this)">复制参数名</button>`;
                reportHtml += `</div>`;
                reportHtml += `<div class="param-prop">类型: ${escapeHtml(param.type)}</div>`;
                if (param.description) {
                    reportHtml += `<div class="param-prop">描述: ${escapeHtml(param.description)}</div>`;
                }
                if (param.collection) {
                    reportHtml += `<div class="param-prop">参数集: ${escapeHtml(param.collection)}</div>`;
                }
                if (param.sort_priority !== undefined) {
                    reportHtml += `<div class="param-prop">排序优先级: ${param.sort_priority}</div>`;
                }
                reportHtml += `</div>`;
            }
        }

        reportHtml += `<div class="footer">由材质参数提取工具生成</div>`;

        document.getElementById('report-content').innerHTML = reportHtml;

        // 更新右侧面板
        document.getElementById('generate-date').textContent = now;
        document.getElementById('date-section').classList.remove('hidden');

        // 更新右侧统计表格
        const rightTableBody = document.querySelector('#right-stats-table tbody');
        let rightTableHtml = '';
        const typeOrder = ['Scalar', 'Vector4', 'Texture2D', 'StaticSwitch', 'Curve', 'CollectionParameter'];
        for (const t of typeOrder) {
            if (typeCounts[t]) {
                rightTableHtml += `<tr><td>${escapeHtml(t)}</td><td>${typeCounts[t]}</td></tr>`;
            }
        }
        for (const [t, count] of Object.entries(typeCounts).sort()) {
            if (!typeOrder.includes(t)) {
                rightTableHtml += `<tr><td>${escapeHtml(t)}</td><td>${count}</td></tr>`;
            }
        }
        rightTableHtml += `<tr><td><strong>总计</strong></td><td><strong>${totalCount}</strong></td></tr>`;
        rightTableBody.innerHTML = rightTableHtml;
        document.getElementById('stats-section').classList.remove('hidden');

        // 显示快速跳转按钮
        document.getElementById('quick-nav-section').classList.remove('hidden');

        // 成功提示
        const source = fromClipboard ? '剪贴板' : '输入栏';
        showToast(`已从${source}生成成功！共 ${totalCount} 个参数`);
    }

    function scrollToSection(id) {
        const el = document.getElementById(id);
        if (el) {
            el.scrollIntoView({ block: 'start' });
            highlightHeading(el);
        }
    }
</script>
</body>
</html>
