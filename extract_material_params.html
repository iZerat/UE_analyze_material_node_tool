<!DOCTYPE html>

<body>
    <!-- 顶部提示 -->
    <div class="toast-container">
        <div class="toast" id="toast">生成成功！</div>
    </div>

    <div class="main-layout">
        <!-- 左侧目录栏 -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-title" data-i18n="toc">目录</div>
            <ul id="toc-list">
            </ul>
        </div>

        <!-- 中间主内容区域 -->
        <div class="center-panel" id="center-panel">


            <div class="center-panel-inner">
                <!-- 报告内容 -->
                <div id="report-content">
                    <div class="empty-state">
                        <h3 data-i18n="waiting">等待输入</h3>
                        <p data-i18n="waitingDesc">点击右侧「粘贴并重新生成」自动读取剪贴板并生成报告<br>或在右侧输入栏手动粘贴后点击生成</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧信息面板 -->
        <div class="right-panel" id="right-panel">
            <div class="right-panel-title">
                <span data-i18n="panelTitle">操作面板</span>
                <button class="btn-lang" id="lang-toggle" onclick="toggleLanguage()">EN</button>
            </div>

            <!-- 粘贴并重新生成按钮 -->
            <button class="btn-paste-generate" onclick="pasteAndGenerate()" data-i18n="pasteGenerate">粘贴并重新生成</button>

            <!-- 输入区域 -->
            <div class="input-section-right">
                <textarea id="material-input" placeholder="手动粘贴虚幻材质文本到这里，然后点击下方按钮生成..."></textarea>
                <button class="btn-from-input" onclick="generateFromInput()" data-i18n="inputGenerate">从输入栏中重新生成</button>
            </div>

            <!-- 装饰线1 -->
            <div class="divider hidden" id="divider-1"></div>

            <!-- 生成日期 -->
            <div class="right-panel-section hidden" id="date-section">
                <div class="right-panel-label" data-i18n="genDate">生成日期</div>
                <div class="generate-date" id="generate-date">--</div>
            </div>

            <!-- 装饰线2 -->
            <div class="divider hidden" id="divider-2"></div>

            <!-- 参数统计表格 -->
            <div class="right-panel-section hidden" id="stats-section">
                <div class="right-panel-label" data-i18n="paramStats">参数统计</div>
                <table class="stats-table" id="right-stats-table">
                    <thead><tr><th data-i18n="type">类型</th><th data-i18n="count">数量</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>

            <!-- 快速跳转按钮 -->
            <div class="quick-nav-section hidden" id="quick-nav-section">
                <div class="quick-nav-buttons">
                    <button class="btn-quick-nav" onclick="scrollToTop()" data-i18n="toTop">到顶部</button>
                    <button class="btn-quick-nav" onclick="scrollToBottom()" data-i18n="toBottom">到底部</button>
                </div>
            </div>
        </div>
    </div>

<script>
    // ==================== 多语言支持 ====================
    const i18n = {
        zh: {
            toc: '目录',
            waiting: '等待输入',
            waitingDesc: '点击右侧「粘贴并重新生成」自动读取剪贴板并生成报告<br>或在右侧输入栏手动粘贴后点击生成',
            panelTitle: '操作面板',
            pasteGenerate: '粘贴并重新生成',
            inputGenerate: '从输入栏中重新生成',
            genDate: '生成日期',
            paramStats: '参数统计',
            type: '类型',
            count: '数量',
            toTop: '到顶部',
            toBottom: '到底部',
            copyParamName: '复制参数名',
            copied: '已复制',
            copyGroupName: '复制分组名',
            locateInToc: '在目录中定位',
            total: '总计',
            generatedFrom: 'generated from',
            generatedSuccess: 'successfully! Total',
            params: 'parameters',
            clipboardEmpty: '剪贴板为空',
            clipboardError: '无法读取剪贴板，请确保已授予网页剪贴板权限',
            inputEmpty: '输入栏为空，请先粘贴内容',
            placeholder: '手动粘贴虚幻材质文本到这里，然后点击下方按钮生成...',
            footer: '由材质参数提取工具生成',
            reportTitle: '材质参数统计报告',
            materialParamReport: '材质参数统计报告',
            collectionParams: '材质参数集',
            paramType: '类型',
            desc: '描述',
            default: '默认值',
            defaultTexture: '默认贴图',
            curveRes: '曲线资源',
            paramCollection: '参数集',
            sortPriority: '排序优先级',
            ungrouped: '未分组 (None)',
            other: 'Other'
        },
        en: {
            toc: 'Table of Contents',
            waiting: 'Waiting for Input',
            waitingDesc: 'Click "Paste & Regenerate" on the right to read clipboard and generate report<br>Or manually paste in the input field on the right and click generate',
            panelTitle: 'Control Panel',
            pasteGenerate: 'Paste & Regenerate',
            inputGenerate: 'Generate from Input',
            genDate: 'Generated Date',
            paramStats: 'Parameter Statistics',
            type: 'Type',
            count: 'Count',
            toTop: 'To Top',
            toBottom: 'To Bottom',
            copyParamName: 'Copy Name',
            copied: 'Copied',
            copyGroupName: 'Copy Group',
            locateInToc: 'Locate in TOC',
            total: 'Total',
            generatedFrom: 'Generated from',
            generatedSuccess: 'successfully! Total',
            params: 'parameters',
            clipboardEmpty: 'Clipboard is empty',
            clipboardError: 'Cannot read clipboard, please ensure clipboard permission is granted',
            inputEmpty: 'Input field is empty, please paste content first',
            placeholder: 'Paste Unreal material text here, then click the button below to generate...',
            footer: 'Generated by Material Parameter Extractor',
            reportTitle: 'Material Parameter Report',
            materialParamReport: 'Material Parameter Report',
            collectionParams: 'Collection Parameters',
            paramType: 'Type',
            desc: 'Description',
            default: 'Default',
            defaultTexture: 'Default Texture',
            curveRes: 'Curve Resource',
            paramCollection: 'Collection',
            sortPriority: 'Sort Priority',
            ungrouped: 'Ungrouped (None)',
            other: 'Other'
        }
    };

    let currentLang = 'zh';

    function toggleLanguage() {
        currentLang = currentLang === 'zh' ? 'en' : 'zh';
        document.getElementById('lang-toggle').textContent = currentLang === 'zh' ? 'EN' : '中';
        applyLanguage();
        // 如果有已生成的报告，重新生成以应用新语言（不显示 toast）
        if (lastInputText) {
            suppressToast = true;
            doGenerate(lastInputText, lastFromClipboard);
            suppressToast = false;
        }
    }

    function t(key) {
        return i18n[currentLang][key] || key;
    }

    function applyLanguage() {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (i18n[currentLang][key]) {
                el.innerHTML = i18n[currentLang][key];
            }
        });
        // 更新 placeholder
        const textarea = document.getElementById('material-input');
        if (textarea && i18n[currentLang].placeholder) {
            textarea.placeholder = i18n[currentLang].placeholder;
        }
    }

    // ==================== 全局状态 ====================
    let lastInputText = '';
    let lastFromClipboard = false;
    let suppressToast = false;

    // ==================== 提取逻辑 ====================
    function extractMaterialParameters(inputText) {
        const parameters = [];
        const lines = inputText.split('\n');
        const totalLines = lines.length;

        for (let i = 0; i < totalLines; i++) {
            const line = lines[i];
            const paramNameMatch = line.match(/ParameterName="([^"]+)"/);

            if (paramNameMatch) {
                const paramName = paramNameMatch[1];
                let nodeStart = i;
                let nodeEnd = i;

                // 向上找最近的 Begin Object
                for (let j = i; j >= Math.max(0, i - 100); j--) {
                    if (lines[j].includes('Begin Object Class=')) {
                        nodeStart = j;
                        break;
                    }
                }

                // 向下找对应的 End Object
                let depth = 1;
                for (let j = i + 1; j < Math.min(totalLines, i + 200); j++) {
                    if (lines[j].includes('Begin Object Class=')) {
                        depth++;
                    } else if (lines[j].includes('End Object')) {
                        depth--;
                        if (depth === 0) {
                            nodeEnd = j;
                            break;
                        }
                    }
                }

                // 获取类型
                let paramType = "Unknown";
                const classMatch = lines[nodeStart].match(/Begin Object Class=([^\s]+)/);
                if (classMatch) {
                    const fullClass = classMatch[1];
                    if (fullClass.includes('ScalarParameter')) paramType = "Scalar";
                    else if (fullClass.includes('VectorParameter')) paramType = "Vector4";
                    else if (fullClass.includes('TextureSampleParameter2D')) paramType = "Texture2D";
                    else if (fullClass.includes('StaticSwitchParameter')) paramType = "StaticSwitch";
                    else if (fullClass.includes('CurveAtlasRowParameter')) paramType = "Curve";
                    else if (fullClass.includes('CollectionParameter')) paramType = "CollectionParameter";
                    else if (fullClass.includes('MaterialExpressionTransform')) paramType = "NonParameter";
                    else paramType = "Other";
                }

                if (paramType === "Unknown" || paramType === "NonParameter") {
                    if (paramType !== "Other") continue;
                }

                // 搜索 Group
                let group = "";
                for (let k = nodeStart; k <= nodeEnd; k++) {
                    const groupMatch = lines[k].match(/Group="([^"]*)"/);
                    if (groupMatch) {
                        group = groupMatch[1];
                        break;
                    }
                }

                // 搜索 Desc
                let description = "";
                for (let k = nodeStart; k <= nodeEnd; k++) {
                    const descMatch = lines[k].match(/Desc="([^"]*)"/);
                    if (descMatch) {
                        description = descMatch[1];
                        break;
                    }
                }

                // 搜索 SortPriority
                let sortPriority = 32;
                for (let k = nodeStart; k <= nodeEnd; k++) {
                    const sortMatch = lines[k].match(/SortPriority=(\d+)/);
                    if (sortMatch) {
                        sortPriority = parseInt(sortMatch[1]);
                        break;
                    }
                }

                const paramData = {
                    type: paramType,
                    name: paramName,
                    group: group,
                    description: description,
                    sort_priority: sortPriority
                };

                // 根据类型提取额外信息
                if (paramType === "Scalar") {
                    let defaultVal = "0.0";
                    for (let k = nodeStart; k <= nodeEnd; k++) {
                        const defaultMatch = lines[k].match(/DefaultValue=([\d.-]+)/);
                        if (defaultMatch) {
                            defaultVal = defaultMatch[1];
                            break;
                        }
                    }
                    paramData.default = defaultVal;
                } else if (paramType === "Vector4") {
                    let defaultVal = "(0,0,0,1)";
                    for (let k = nodeStart; k <= nodeEnd; k++) {
                        const defaultMatch = lines[k].match(/DefaultValue=\(R=([\d.]+),G=([\d.]+),B=([\d.]+),A=([\d.]+)\)/);
                        if (defaultMatch) {
                            defaultVal = `(${defaultMatch[1]}, ${defaultMatch[2]}, ${defaultMatch[3]}, ${defaultMatch[4]})`;
                            break;
                        }
                    }
                    paramData.default = defaultVal;
                } else if (paramType === "StaticSwitch") {
                    let defaultVal = "false";
                    for (let k = nodeStart; k <= nodeEnd; k++) {
                        const defaultMatch = lines[k].match(/DefaultValue=(\w+)/);
                        if (defaultMatch) {
                            defaultVal = defaultMatch[1];
                            break;
                        }
                    }
                    paramData.default = defaultVal;
                } else if (paramType === "Texture2D") {
                    let texture = "None";
                    for (let k = nodeStart; k <= nodeEnd; k++) {
                        const textureMatch = lines[k].match(/Texture="([^"]+)"/);
                        if (textureMatch) {
                            texture = textureMatch[1];
                            break;
                        }
                    }
                    paramData.default_texture = texture;
                } else if (paramType === "Curve") {
                    let curve = "None";
                    for (let k = nodeStart; k <= nodeEnd; k++) {
                        const curveMatch = lines[k].match(/Curve="([^"]+)"/);
                        if (curveMatch) {
                            curve = curveMatch[1];
                            break;
                        }
                    }
                    paramData.curve = curve;
                } else if (paramType === "CollectionParameter") {
                    let collection = "Unknown";
                    for (let k = nodeStart; k <= nodeEnd; k++) {
                        const collectionMatch = lines[k].match(/Collection="([^"]+)"/);
                        if (collectionMatch) {
                            collection = collectionMatch[1];
                            break;
                        }
                    }
                    paramData.collection = collection;
                }

                parameters.push(paramData);
            }
        }

        // 去重
        const seen = new Set();
        const uniqueParams = [];
        for (const p of parameters) {
            const key = p.name + '|' + p.type;
            if (!seen.has(key)) {
                seen.add(key);
                uniqueParams.push(p);
            }
        }

        return uniqueParams;
    }

    // ==================== 提示动画 ====================
    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 2000);
    }



    // ==================== 复制功能 ====================
    async function copyParamName(name, btnElement) {
        try {
            await navigator.clipboard.writeText(name);
            btnElement.textContent = t('copied');
            btnElement.classList.add('copied');
            setTimeout(() => {
                btnElement.textContent = t('copyParamName');
                btnElement.classList.remove('copied');
            }, 1500);
        } catch (err) {
            const textarea = document.createElement('textarea');
            textarea.value = name;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);

            btnElement.textContent = t('copied');
            btnElement.classList.add('copied');
            setTimeout(() => {
                btnElement.textContent = t('copyParamName');
                btnElement.classList.remove('copied');
            }, 1500);
        }
    }

    async function copyGroupName(name, btnElement) {
        try {
            await navigator.clipboard.writeText(name);
            btnElement.textContent = t('copied');
            btnElement.classList.add('copied');

        } catch (err) {

            textarea.select();

    // ==================== 标题高亮动画 ====================
    function highlightHeading(el) {
        el.classList.add('highlight-scroll');
        setTimeout(() => {
            el.classList.remove('highlight-scroll');
        }, 1200);
    }

    // ==================== 目录定位 ====================
    function locateInToc(anchor) {
        // 高亮目录项
        const tocItems = document.querySelectorAll('#toc-list a');
        tocItems.forEach(item => {
            item.classList.remove('toc-highlight');
        });

        // 找到对应的目录项并高亮
        const tocItem = Array.from(tocItems).find(item => {
            const onclick = item.getAttribute('onclick') || '';
            return onclick.includes(`'${anchor}'`);
        });

        if (tocItem) {
            tocItem.classList.add('toc-highlight');
            setTimeout(() => {
                tocItem.classList.remove('toc-highlight');
            }, 1200);

            // 将目录项滚动到可视区域中间
            const sidebar = document.getElementById('sidebar');
            const itemTop = tocItem.offsetTop;
            const sidebarHeight = sidebar.clientHeight;
            const scrollTarget = itemTop - sidebarHeight / 2 + tocItem.clientHeight / 2;
            sidebar.scrollTo({ top: Math.max(0, scrollTarget) });
        }

        // 同时跳转中间内容到对应位置
        const el = document.getElementById(anchor);
        if (el) {
            el.scrollIntoView({ block: 'center' });
            highlightHeading(el);
        }
    }

    // ==================== 快速跳转 ====================
    function scrollToTop() {
        const panel = document.getElementById('center-panel');
        panel.scrollTo({ top: 0 });
    }

    function scrollToBottom() {
        const panel = document.getElementById('center-panel');
        panel.scrollTo({ top: panel.scrollHeight });
    }

    // ==================== 生成报告 ====================
    async function pasteAndGenerate() {
        try {
            const clipboardText = await navigator.clipboard.readText();
            if (!clipboardText.trim()) {
                alert(t('clipboardEmpty'));
                return;
            }
            doGenerate(clipboardText, true);
        } catch (err) {
            alert(t('clipboardError'));
            console.error('Clipboard error:', err);
        }
    }

    function generateFromInput() {
        const inputText = document.getElementById('material-input').value;
        if (!inputText.trim()) {
            alert(t('inputEmpty'));
            return;
        }
        doGenerate(inputText, false);
    }

    function doGenerate(inputText, fromClipboard) {
        lastInputText = inputText;
        lastFromClipboard = fromClipboard;
        const parameters = extractMaterialParameters(inputText);
        const now = new Date().toLocaleString(currentLang === 'zh' ? 'zh-CN' : 'en-US');

        const typeCounts = {};
        for (const p of parameters) {
            typeCounts[p.type] = (typeCounts[p.type] || 0) + 1;
        }
        const totalCount = parameters.length;

        const collectionParams = parameters.filter(p => p.type === 'CollectionParameter');
        const normalParams = parameters.filter(p => p.type !== 'CollectionParameter');

        normalParams.sort((a, b) => {
            const aEmpty = a.group === "" ? 0 : 1;
            const bEmpty = b.group === "" ? 0 : 1;
            if (aEmpty !== bEmpty) return aEmpty - bEmpty;
            if (a.group !== b.group) return a.group.localeCompare(b.group);
            const aPriority = a.sort_priority !== undefined ? a.sort_priority : 9999;
            const bPriority = b.sort_priority !== undefined ? b.sort_priority : 9999;
            if (aPriority !== bPriority) return aPriority - bPriority;
            return a.name.localeCompare(b.name);
        });

        const groups = {};
        for (const p of normalParams) {
            const groupName = p.group || t('ungrouped');
            if (!groups[groupName]) groups[groupName] = [];
            groups[groupName].push(p);
        }

        const sortedGroups = Object.keys(groups).sort((a, b) => {
            if (a === t('ungrouped')) return -1;
            if (b === t('ungrouped')) return 1;
            return a.localeCompare(b);
        });

        function makeAnchor(text) {
            return text.toLowerCase()
                .replace(/ /g, '-')
                .replace(/[()]/g, '')
                .replace(/[^\w\-]/g, '')
                .replace(/-+/g, '-')
                .replace(/^-|-$/g, '');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 构建目录
        let tocHtml = '';
        for (const groupName of sortedGroups) {
            const anchor = makeAnchor(groupName);
            tocHtml += `<li class="group-item"><a onclick="scrollToSection('${anchor}')">${escapeHtml(groupName)}</a></li>`;
        }
        if (collectionParams.length > 0) {
            tocHtml += `<li class="group-item"><a onclick="scrollToSection('collection-params')">${t('collectionParams')}</a></li>`;
        }
        document.getElementById('toc-list').innerHTML = tocHtml;

        // 提取材质名称
        let materialName = '';
        const materialMatch = inputText.match(/Material="[^"]*\.([A-Za-z0-9_]+)'/);
        if (materialMatch) {
            materialName = materialMatch[1];
        }

        // 构建报告内容
        let reportHtml = '';

        const titleText = materialName 
            ? `${materialName} ${t('materialParamReport')}` 
            : t('reportTitle');
        reportHtml += `<h1>${escapeHtml(titleText)}</h1>`;

        for (const groupName of sortedGroups) {
            const anchor = makeAnchor(groupName);
            reportHtml += `<h2 id="${anchor}">${escapeHtml(groupName)}`;
            reportHtml += `<span class="group-actions">`;
            reportHtml += `<button class="btn-group-action" onclick="copyGroupName('${escapeHtml(groupName)}', this)">${t('copyGroupName')}</button>`;
            reportHtml += `<button class="btn-group-action" onclick="locateInToc('${anchor}')">${t('locateInToc')}</button>`;
            reportHtml += `</span></h2>`;

            for (const param of groups[groupName]) {
                reportHtml += `<div class="param-block">`;
                reportHtml += `<div class="param-header">`;
                reportHtml += `<div class="param-name"><code>${escapeHtml(param.name)}</code></div>`;
                reportHtml += `<button class="btn-copy" onclick="copyParamName('${escapeHtml(param.name)}', this)">${t('copyParamName')}</button>`;
                reportHtml += `</div>`;
                reportHtml += `<div class="param-prop">${t('paramType')}: ${escapeHtml(param.type)}</div>`;
                if (param.description) {
                    reportHtml += `<div class="param-prop">${t('desc')}: ${escapeHtml(param.description)}</div>`;
                }
                if (param.default !== undefined) {
                    let dv = String(param.default);
                    if (dv.startsWith("'") && dv.endsWith("'")) dv = dv.slice(1, -1);
                    reportHtml += `<div class="param-prop">${t('default')}: ${escapeHtml(dv)}</div>`;
                }
                if (param.default_texture) {
                    let tex = param.default_texture;
                    if (tex.includes("'")) {
                        const parts = tex.split("'");
                        tex = parts.length > 1 ? parts[parts.length - 2] : tex;
                    }
                    reportHtml += `<div class="param-prop">${t('defaultTexture')}: ${escapeHtml(tex)}</div>`;
                }
                if (param.curve) {
                    reportHtml += `<div class="param-prop">${t('curveRes')}: ${escapeHtml(param.curve)}</div>`;
                }
                if (param.collection) {
                    reportHtml += `<div class="param-prop">${t('paramCollection')}: ${escapeHtml(param.collection)}</div>`;
                }
                if (param.sort_priority !== undefined) {
                    reportHtml += `<div class="param-prop">${t('sortPriority')}: ${param.sort_priority}</div>`;
                }
                reportHtml += `</div>`;
            }
        }

        if (collectionParams.length > 0) {
            reportHtml += `<h2 id="collection-params">${t('collectionParams')}</h2>`;
            for (const param of collectionParams) {
                reportHtml += `<div class="param-block">`;
                reportHtml += `<div class="param-header">`;
                reportHtml += `<div class="param-name"><code>${escapeHtml(param.name)}</code></div>`;
                reportHtml += `<button class="btn-copy" onclick="copyParamName('${escapeHtml(param.name)}', this)">${t('copyParamName')}</button>`;
                reportHtml += `</div>`;
                reportHtml += `<div class="param-prop">${t('paramType')}: ${escapeHtml(param.type)}</div>`;
                if (param.description) {
                    reportHtml += `<div class="param-prop">${t('desc')}: ${escapeHtml(param.description)}</div>`;
                }
                if (param.collection) {
                    reportHtml += `<div class="param-prop">${t('paramCollection')}: ${escapeHtml(param.collection)}</div>`;
                }
                if (param.sort_priority !== undefined) {
                    reportHtml += `<div class="param-prop">${t('sortPriority')}: ${param.sort_priority}</div>`;
                }
                reportHtml += `</div>`;
            }
        }

        reportHtml += `<div class="footer">${t('footer')}</div>`;

        document.getElementById('report-content').innerHTML = reportHtml;

        // 更新右侧面板
        document.getElementById('generate-date').textContent = now;
        document.getElementById('divider-1').classList.remove('hidden');
        document.getElementById('date-section').classList.remove('hidden');
        document.getElementById('divider-2').classList.remove('hidden');

        const rightTableBody = document.querySelector('#right-stats-table tbody');
        let rightTableHtml = '';
        const typeOrder = ['Scalar', 'Vector4', 'Texture2D', 'StaticSwitch', 'Curve', 'CollectionParameter'];
        for (const t of typeOrder) {
            if (typeCounts[t]) {
                rightTableHtml += `<tr><td>${escapeHtml(t)}</td><td>${typeCounts[t]}</td></tr>`;
            }
        }
        for (const [t, count] of Object.entries(typeCounts).sort()) {
            if (!typeOrder.includes(t)) {
                rightTableHtml += `<tr><td>${escapeHtml(t)}</td><td>${count}</td></tr>`;
            }
        }
        rightTableHtml += `<tr><td><strong>${t('total')}</strong></td><td><strong>${totalCount}</strong></td></tr>`;
        rightTableBody.innerHTML = rightTableHtml;
        document.getElementById('stats-section').classList.remove('hidden');

        // 显示快速跳转按钮
        document.getElementById('quick-nav-section').classList.remove('hidden');

        if (!suppressToast) {
            const source = fromClipboard ? (currentLang === 'zh' ? '剪贴板' : 'clipboard') : (currentLang === 'zh' ? '输入栏' : 'input field');
            showToast(`${t('generatedFrom')} ${source} ${t('generatedSuccess')} ${totalCount} ${t('params')}`);
        }
    }

    function scrollToSection(id) {
        const el = document.getElementById(id);
        if (el) {
            el.scrollIntoView({ block: 'start' });
            highlightHeading(el);
        }
    }
</script>
